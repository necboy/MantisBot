<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="description" content="MantisBot - 您的个人 AI 助理" />
    <link rel="manifest" href="/manifest.json" />
    <title>MantisBot</title>
    <script>
      // 防止页面闪烁（FOUC）：在 React 渲染前同步应用主题 class
      (function () {
        var saved = localStorage.getItem('theme-preference');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var shouldDark = saved === 'dark' || (saved !== 'light' && prefersDark);
        if (shouldDark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
